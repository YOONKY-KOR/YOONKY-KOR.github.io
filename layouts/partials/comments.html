{{- if .Param "comments" }}
<div class="comments">
  <script src="https://giscus.app/client.js"
    data-repo="{{ site.Params.giscus.repo }}"
    data-repo-id="{{ site.Params.giscus.repoId }}"
    {{- with site.Params.giscus.category }}
    data-category="{{ . }}"
    {{- end }}
    data-category-id="{{ site.Params.giscus.categoryId }}"
    data-mapping="{{ site.Params.giscus.mapping | default "pathname" }}"
    data-strict="{{ site.Params.giscus.strict | default "0" }}"
    data-reactions-enabled="{{ site.Params.giscus.reactionsEnabled | default "1" }}"
    data-emit-metadata="{{ site.Params.giscus.emitMetadata | default "0" }}"
    data-input-position="{{ site.Params.giscus.inputPosition | default "bottom" }}"
    data-theme="noborder_light"
    data-lang="{{ site.Params.giscus.lang | default "ko" }}"
    crossorigin="anonymous"
    async>
  </script>
</div>

<script>
  // PaperMod 테마에 맞춰 Giscus 테마 동기화
  // light → noborder_light (흰 배경, 테두리 없어 깔끔)
  // dark  → dark_dimmed   (눈에 편한 소프트 다크)
  function getGiscusTheme() {
    return document.querySelector('html').dataset.theme === 'dark'
      ? 'dark_dimmed'
      : 'noborder_light';
  }

  function sendGiscusTheme(theme) {
    const iframe = document.querySelector('iframe.giscus-frame');
    if (!iframe) return;
    iframe.contentWindow.postMessage(
      { giscus: { setConfig: { theme } } },
      'https://giscus.app'
    );
  }

  // 페이지 로드 후 현재 테마 적용
  window.addEventListener('load', () => {
    const observer = new MutationObserver(() => {
      const iframe = document.querySelector('iframe.giscus-frame');
      if (iframe) {
        sendGiscusTheme(getGiscusTheme());
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  });

  // 테마 토글 버튼 클릭 시 즉시 동기화
  const themeToggle = document.getElementById('theme-toggle');
  if (themeToggle) {
    themeToggle.addEventListener('click', () => {
      setTimeout(() => sendGiscusTheme(getGiscusTheme()), 100);
    });
  }
</script>
{{- end }}
